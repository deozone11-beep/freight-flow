spring.application.name=freightflow-backend

# Active profile: local dev uses MySQL by default. On Render, set SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

server.port=${PORT:8080}

app.jwt.secret=${JWT_SECRET:change-this-to-a-long-random-secret-key-min-32-chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# SMTP credentials and the public frontend URL are supplied through environment variables.
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


