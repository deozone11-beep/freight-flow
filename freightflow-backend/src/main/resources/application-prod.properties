# Production - Render PostgreSQL
# Render's Postgres gives you a connection string like:
#   postgres://user:pass@host:port/dbname
# JDBC needs the "jdbc:postgresql://" form instead, so set these separate
# env vars in the Render dashboard (values come from your Render Postgres instance):
#   DB_HOST, DB_PORT (usually 5432), DB_NAME, DB_USER, DB_PASSWORD
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
